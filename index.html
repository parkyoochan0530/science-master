<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

     crossorigin="anonymous"></script>
<title>Science Master - 영재고·과고 과학 공식 암기</title>
<meta name="description" content="영재고, 과고 준비생을 위한 물리·화학·수학 공식 암기 사이트">
<meta name="keywords" content="영재고, 과고, 과학 공식, 물리 공식, 화학 공식, Science Master">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
<h1>Science Master - 영재고·과고 과학 공식 암기</h1>

<div class="top-bar">

<input
type="text"
id="searchInput"
placeholder="📚 개념 검색..."
oninput="searchConcept()">

<input
type="text"
id="formulaSearch"
placeholder="📐 공식 검색..."
oninput="searchFormula()">

<button onclick="toggleDarkMode()">
🌙 다크모드
</button>

</div>
</header>



<div class="stats">

<div>LV <span id="level">1</span></div>

<div>XP <span id="xp">0</span></div>

<div>정답률 <span id="accuracy">0</span>%</div>

<div>정답 <span id="correctCount">0</span></div>

<div>오답 <span id="wrongCount">0</span></div>

<div id="todayStats">
    <h3>📊 오늘의 학습</h3>

    <div>오늘 푼 문제:
        <span id="todaySolved">0</span>
    </div>

    <div>오늘 정답:
        <span id="todayCorrect">0</span>
    </div>

    <div>오늘 정답률:
        <span id="todayAccuracy">0</span>%
    </div>
</div>

</div>

<div id="achievements">
<h3>🏆 업적</h3>
<ul id="achievementList"></ul>
</div>

<div class="xp-bar">
    <div id="xpFill"></div>
</div>

<nav>
<button onclick="
showTab('formulas');
document
.getElementById('formulaResults')
.classList.remove('hidden-formula');
">
공식
</button>
<button onclick="showTab('flashcards')">
개념 카드
</button>
<button onclick="nextCard()">
다음 카드
</button>

<button onclick="showTab('quiz')">
퀴즈
</button>

<button onclick="showTab('wrong')">
오답노트
</button>

<button onclick="showTab('concepts')">
개념
</button>

</nav>

<main>

<div id="formulaResults"></div>

<div id="formulaResults" class="hidden-formula"></div>

<section id="flashcards">

<h2>개념 카드</h2>

<div class="card"
onclick="flipCard()"
id="flashcard">
밀도 공식은?
</div>

</section>

<section id="quiz" class="hidden">

<h2>퀴즈</h2>

<button onclick="setQuizMode('all')">
전체 퀴즈
</button>

<button onclick="setQuizMode('wrong')">
오답 복습
</button>

<p id="question"></p>

<div id="answers"></div>

<p id="result"></p>

</section>

<section id="wrong" class="hidden">

<h2>오답노트</h2>

<ul id="wrongList"></ul>

</section>

<section id="concepts" class="hidden">

<h2>개념 검색</h2>


<div id="conceptResults"></div>

</section>

</main>

</body>
</html>
